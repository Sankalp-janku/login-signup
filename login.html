<body>
    <div class="box">
        <div class="page">
            <div id="logo"><i class="fa-solid fa-arrow-right-to-bracket" style="color: rgb(0, 0, 0);"></i>login</div>
            <div  id="logo" style=" opacity: 0.5;"><i class="fa-solid fa-user-plus" style="color: rgb(0, 0, 0);"></i>signup</div>
        </div><br>
        <div class="form">
            <form action="#">

                Email address <br>
                <input id="email" type="text" placeholder="Enter your Email address">
                </label>
                <br><br>
                <div id="pass-box">
                <label for="pass">
                    <div>password  &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp; &nbsp;&nbsp;&nbsp;  forget password?</div>
                    <div></div>

                </div>
                <br> <br><br><button id="logbtn"><b>Login</b></button>

                <div class="link-box">
                    <button class="btn"><i class="fa-brands fa-google" style="color: rgb(0, 0, 0);"></i>Continue with Google</button>
                    <button class="btn"><i class="fa-brands fa-apple" style="color: rgb(0, 0, 0);"></i>Continue with apple</button>
                    <button class="btn"><i class="fa-solid fa-hand-holding-dollar" style="color: rgb(0, 0, 0);"></i>continue with binace</button>
                    <button class="btn"><i class="fa-solid fa-wallet" style="color: rgb(0, 0, 0);"></i>continue with wallet</button>
                    
                </div>
                <br><br><hr>
                <div class="footer">
                <p>dont have aount yet? <a href="signup.html">Signup</a></p>
                <p style="display: none;" id="log_page">login</p>
                </div>
            </form>
        </div>
